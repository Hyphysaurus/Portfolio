<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario Ramirez — Portfolio</title>
  <meta name="description" content="Builder who ships — software, games, and creative tools. Former educator, now building products end-to-end." />

  <link rel="preconnect" href="https://fonts.googleapis.com/" />
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
</head>

<body>
  <!-- Nav -->
  <nav id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Mario R.</a>
      <div class="nav-links">
        <a href="work.html">Work</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="mailto:hyphysaurus@gmail.com" class="nav-contact">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <h1>
      <span>Building at the intersection</span>
      <span>of <em>product</em> &amp; play</span>
    </h1>
    <p class="hero-sub">
      Hey — I'm Mario. Former educator, now building software,
      games, and creative tools. I like things that feel alive.
    </p>
    <div class="avail-badge">
      <span class="avail-dot"></span>
      Open to opportunities
    </div>
    <div class="hero-divider"></div>
  </header>

  <!-- Selected Projects -->
  <section id="projects">
    <div class="section-label fade-up"><span>Selected Projects</span></div>
    <div id="project-grid" class="project-grid"></div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-inner">
      <span class="footer-text">&copy; Mario Ramirez 2026</span>
      <div class="footer-links">
        <a href="https://plotfirst.app/" target="_blank" rel="noopener">PlotFirst</a>
        <a href="https://mythicgrounds.com/" target="_blank" rel="noopener">Mythic Grounds</a>
        <a href="https://arkhe.live/" target="_blank" rel="noopener">Arkhe</a>
        <a href="mailto:hyphysaurus@gmail.com">Email</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/projects.js"></script>
  <script src="js/shared.js"></script>
  <script>
    (function() {
      var grid = document.getElementById('project-grid');

      FEATURED_PROJECTS.forEach(function(p, i) {
        var card = document.createElement('div');
        card.className = 'project-card fade-up';

        var top = document.createElement('div');
        top.className = 'project-top';
        var idx = document.createElement('span');
        idx.className = 'project-index';
        idx.textContent = String(i + 1).padStart(2, '0');
        var emoji = document.createElement('span');
        emoji.className = 'project-emoji';
        emoji.textContent = p.emoji;
        top.appendChild(idx);
        top.appendChild(emoji);

        var header = document.createElement('div');
        header.className = 'project-header';
        var title = document.createElement('h3');
        title.className = 'project-title';
        title.textContent = p.title;
        var tag = document.createElement('span');
        tag.className = 'project-tag';
        tag.textContent = p.tag;
        header.appendChild(title);
        header.appendChild(tag);

        var desc = document.createElement('p');
        desc.className = 'project-desc';
        desc.textContent = p.desc;

        card.appendChild(top);
        card.appendChild(header);
        card.appendChild(desc);

        if (p.image) {
          var visual = document.createElement('div');
          visual.className = 'project-visual';
          var img = document.createElement('img');
          img.src = p.image;
          img.alt = p.imageAlt || '';
          img.loading = 'lazy';
          img.onerror = function() { visual.style.display = 'none'; };
          visual.appendChild(img);
          card.appendChild(visual);
        }

        if (p.link) {
          var link = document.createElement('a');
          link.href = p.link;
          link.target = '_blank';
          link.rel = 'noopener';
          link.className = 'project-link';
          link.textContent = 'Visit \u2197';
          card.appendChild(link);
        }

        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
