  <script>
    (function() {
      function renderWorkList(containerId, items) {
        var container = document.getElementById(containerId);
        items.forEach(function(item) {
          var row = document.createElement('div');
          row.className = 'work-item';

          var content = document.createElement('div');
          var title = document.createElement('div');
          title.className = 'work-title';
          title.textContent = item.title;
          var desc = document.createElement('p');
          desc.className = 'work-desc';
          desc.textContent = item.desc;
          content.appendChild(title);
          content.appendChild(desc);

          if (item.link) {
            var link = document.createElement('a');
            link.href = item.link;
            link.target = '_blank';
            link.rel = 'noopener';
            link.className = 'work-link';
            link.textContent = 'Visit \u2197';
            content.appendChild(link);
          }

          var tag = document.createElement('span');
          tag.className = 'work-tag';
          tag.textContent = item.tag;

          row.appendChild(content);
          row.appendChild(tag);
          container.appendChild(row);
        });
      }

      renderWorkList('shipped-list', SHIPPED_PROJECTS);
      renderWorkList('progress-list', IN_PROGRESS_PROJECTS);
      renderWorkList('writing-list', WRITING_PROJECTS);
    })();
  </script>
